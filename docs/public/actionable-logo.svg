  <circle cx="860" cy="780" r="1.8" fill="#D4760A" opacity="0.35"/>
  
  <line x1="830" y1="720" x2="920" y2="800" stroke="#D4760A" stroke-width="0.8" opacity="0.18"/>
  <line x1="830" y1="720" x2="770" y2="840" stroke="#D4760A" stroke-width="0.8" opacity="0.15"/>
  <line x1="920" y1="800" x2="860" y2="780" stroke="#D4760A" stroke-width="0.6" opacity="0.12"/>
